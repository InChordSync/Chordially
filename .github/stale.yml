# Probot Stale Configuration
# Automatically marks and closes stale issues and pull requests.

# Number of days of inactivity before an issue or PR is marked stale
daysUntilStale: 30

# Number of days of inactivity after being marked stale before closing
daysUntilClose: 7

# Label applied when an issue or PR becomes stale
staleLabel: stale

# Labels that exempt an issue or PR from being marked stale
exemptLabels:
  - blocked
  - pinned

# Comment posted when an issue or PR is marked stale
markComment: >
  This issue or pull request has been inactive for 30 days and has been marked
  as stale. If there is no further activity within 7 days it will be closed
  automatically. If this is still relevant, please leave a comment or remove
  the stale label to reset the timer.

# Comment posted when an issue or PR is closed due to inactivity
closeComment: >
  This issue or pull request has been closed automatically after 7 days of
  inactivity following the stale notice. If you believe this was closed in
  error or the work is still needed, please reopen it with a brief update.
